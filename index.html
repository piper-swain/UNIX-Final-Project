<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    min-height: 100vh; 
    background: #5b8eb0;
    background: linear-gradient(90deg,rgba(91, 142, 176, 1) 0%, rgba(105, 194, 137, 1) 50%, rgba(227, 196, 123, 1) 100%);
   }

table {
  background: white;
  border-collapse: collapse;
  border-radius: 10px;
  overflow: hidden;
}

/* grid cells */
td {
  width: 50px;
  height: 50px;
  text-align: center;
  vertical-align: middle;
  background: white;
  border: 1px solid #ddd;
  transition: background 0.2s;
}

/* header row stays styled */
th {
  background: #f2f2f2;
}


button {
  background: white;
  border: none;
  padding: 12px 25px;
  margin: 5px;
  border-radius: 25px;
  font-size: 15px;
  font-weight: bold;
  color: #4489B8;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-3px) scale(1.05);
  background: #F0D189;
}

button:active {
  transform: translateY(1px);
}


.win-banner {
    position: fixed;       /* banner stays in place */
    top: 40%; left: 50%;   /* center horizontally and vertically */
    transform: translate(-50%, -50%); /* center the banner */
    background: rgb(255, 234, 115);
    color: rgb(114, 83, 4);
    padding: 20px; /* padding for the banner. Padding is the space between the content and the border */
    font-size: 40px;
    border-radius: 10px;
    animation: pop 0.5s ease-in-out infinite alternate;
}

@keyframes pop {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.2); }
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: 0;
  left: 50%;
  z-index: 9999;
  animation: fall 2s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}

@keyframes popIn {
  0% {
    transform: scale(0.5);
    opacity: 0;
  }
  60% {
    transform: scale(1.3);
    opacity: 1;
  }
  100% {
    transform: scale(1);
  }
}

#call.animate {
  animation: popIn 0.4s ease;
}

#call {
  pointer-events: none;
  position: relative;
  z-index: 1;
}

table {
  position: relative;
  z-index: 2;
}

</style>
</head>

<body>

<h1 style="text-align:center; font-size:50px; color:white; text-shadow: 2px 2px 6px rgba(0,0,0,0.4);">⭐ Let's play BINGO! ⭐</h1>

<div style="text-align:center; font-size:40px;color:white;text-shadow: 2px 2px 6px rgba(0,0,0,0.4);" id="call">draw Next Number</div>

<div style="text-align:center; margin:10px;">
<button onclick="draw()">Draw Number</button>
<button onclick="location.reload()">Restart</button>
</div>

<div style="display:flex; justify-content:space-around;">

<div>
<h2 style="text-align:center; color:white; text-shadow:2px 2px 6px rgba(0,0,0,0.4)">Your Bingo Card</h2>
<table id="player" border="1" style="font-size:30px;">
<tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
</table>
</div>

<div>
<h2 style="text-align:center; color:white; text-shadow: 2px 2px 6px rgba(0,0,0,0.4)">Robot's Bingo Card</h2>
<table id="robot" border="1" style="font-size:30px;">
<tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
</table>
</div>

</div>

<script>
let calls = [];
let index = 0;

function initCalls() {
  let letters = ['B','I','N','G','O'];
  let ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];

  for (let i = 0; i < 5; i++) {
    for (let n = ranges[i][0]; n <= ranges[i][1]; n++) {
      calls.push(letters[i] + n);
    }
  }

  for (let i = calls.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [calls[i], calls[j]] = [calls[j], calls[i]];
  }
}

function generateBoard(tableId, clickable) {
  let table = document.getElementById(tableId);

  for (let r = 0; r < 5; r++) {
    let row = document.createElement("tr");

    for (let c = 0; c < 5; c++) {
      let cell = document.createElement("td");

      let min = c * 15 + 1;
      let max = min + 14;

      if (r === 2 && c === 2) {
        cell.innerText = "⭐";
        cell.style.backgroundColor = tableId === "player" ? "lightgreen" : "lightcoral";
      } else {
        let num = Math.floor(Math.random() * (max - min + 1)) + min;
        cell.innerText = num;

        if (clickable) {
          cell.onclick = () => mark(cell);
        }
      }

      row.appendChild(cell);
    }

    table.appendChild(row);
  }
}

function draw() {
  if (index >= calls.length) {
    document.getElementById('call').innerText = 'No more numbers';
    return;
  }

  let call = calls[index];
  let el = document.getElementById('call');

  el.innerText = call[0] + "-" + call.slice(1);

  // restart animation
  el.classList.remove("animate");
  void el.offsetWidth; // forces reflow so animation can replay
  el.classList.add("animate");

  index++;
}

function showWin(message) {
  let banner = document.createElement('div');
  banner.className = 'win-banner';
  banner.innerText = message;
  document.body.appendChild(banner);
}

function checkWin(boardId) {
  let cells = document.querySelectorAll('#' + boardId + ' td');
  let grid = [];

  for (let i = 0; i < 25; i++) {
    grid.push(
      cells[i].innerText === 'FREE' ||
      cells[i].style.backgroundColor !== ''
    );
  }

  for (let i = 0; i < 5; i++) {
    if (grid[i*5] && grid[i*5+1] && grid[i*5+2] && grid[i*5+3] && grid[i*5+4]) return true;
    if (grid[i] && grid[i+5] && grid[i+10] && grid[i+15] && grid[i+20]) return true;
  }

  if (grid[0] && grid[6] && grid[12] && grid[18] && grid[24]) return true;
  if (grid[4] && grid[8] && grid[12] && grid[16] && grid[20]) return true;

  return false;
}

setInterval(() => {
  let call = document.getElementById('call').innerText;
  if (!call.includes('-')) return;

  let number = call.split('-')[1];
  let cells = document.querySelectorAll('#robot td');

  for (let cell of cells) {
    if (cell.innerText === number) {
      cell.style.backgroundColor = 'lightcoral';
      if (checkWin('robot')) showWin('Robot wins!');
      break;
    }
  }
}, 2000);

window.onload = () => {
  initCalls();
  generateBoard("player", true);
  generateBoard("robot", false);
};

function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    let conf = document.createElement("div");
    conf.className = "confetti";

    conf.style.left = Math.random() * 100 + "vw";
    conf.style.backgroundColor =
      ["#ff4fa3", "#ffea73", "#69c289", "#5b8eb0"][Math.floor(Math.random()*4)];

    conf.style.animationDuration = (1 + Math.random() * 2) + "s";

    document.body.appendChild(conf);

    setTimeout(() => conf.remove(), 3000);
  }
}

</script>

</body>
</html>  }
</style>
